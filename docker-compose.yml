services:
  mysql:
    image: mysql:8.4
    container_name: aiapitest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_api_test_platform}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_BIND_HOST:-127.0.0.1}:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - aiapitest-mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aiapitest-platform

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    labels:
      aiapitest.base-image: jenkins/jenkins:lts-jdk17
    container_name: aiapitest-jenkins
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JENKINS_OPTS: ${JENKINS_OPTS:-}
    ports:
      - "${JENKINS_HTTP_PORT:-8080}:8080"
      - "${JENKINS_AGENT_PORT:-50001}:50000"
    volumes:
      - aiapitest-jenkins-home:/var/jenkins_home
      - ${PROJECT_WORKSPACE:-.}:/workspace/AiApiTest-DWP
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - aiapitest-platform

volumes:
  aiapitest-mysql-data:
    name: aiapitest-mysql-data
  aiapitest-jenkins-home:
    name: aiapitest-jenkins-home

networks:
  aiapitest-platform:
    name: aiapitest-platform
